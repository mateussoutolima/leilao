name: Leilão PB — rotina diária

on:
  schedule:
    # Minuto "quebrado" (não no topo da hora) para reduzir a chance de o GitHub
    # descartar o agendamento — o cron do Actions costuma atrasar/derrubar runs
    # marcadas em :00. Dois horários: o 2º é backup caso o 1º não dispare.
    - cron: "17 10 * * *"   # ~07:17 BRT (horário principal)
    - cron: "23 13 * * *"   # ~10:23 BRT (backup do mesmo dia; rotina é idempotente)
  workflow_dispatch: {}   # botão "Run workflow" para rodar na hora

# Evita duas execuções simultâneas (ex.: cron + clique manual)
concurrency:
  group: leilao-diario
  cancel-in-progress: false

permissions:
  contents: write      # para commitar o estado de volta no repo
  pages: write         # para publicar o painel no GitHub Pages
  id-token: write      # exigido pelo deploy do Pages

# Roda as actions no Node.js 24 (silencia o aviso de depreciação do Node 20,
# já compatível com a mudança forçada do GitHub a partir de jun/2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  rotina:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Montar credenciais do Z-API (a partir dos Secrets)
        env:
          ZAPI_INSTANCE_ID: ${{ secrets.ZAPI_INSTANCE_ID }}
          ZAPI_TOKEN: ${{ secrets.ZAPI_TOKEN }}
          ZAPI_CLIENT_TOKEN: ${{ secrets.ZAPI_CLIENT_TOKEN }}
        run: |
          python3 - <<'PY'
          import json, os
          json.dump({
              "instance_id": os.environ.get("ZAPI_INSTANCE_ID", ""),
              "token": os.environ.get("ZAPI_TOKEN", ""),
              "client_token": os.environ.get("ZAPI_CLIENT_TOKEN", ""),
          }, open("whatsapp_secrets.json", "w"))
          PY

      - name: 1/4 — Baixar CSV da Caixa (IP residencial, fallback direto)
        id: download
        env:
          ZYTE_API_KEY: ${{ secrets.ZYTE_API_KEY }}
          ZYTE_STATS_KEY: ${{ secrets.ZYTE_STATS_KEY }}   # opcional — uso/saldo no heartbeat
          ZYTE_ORG_ID: ${{ secrets.ZYTE_ORG_ID }}         # opcional
        run: |
          # Não derruba o job se falhar: registramos 'fresh' e seguimos com o último CSV bom.
          if bash baixar_csv.sh; then
            echo "fresh=true"  >> "$GITHUB_OUTPUT"
          else
            echo "fresh=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 2/4 — Analisar + aplicar alarmes + montar fila
        env:
          LEILAO_RECIPIENTS: ${{ secrets.LEILAO_RECIPIENTS }}
        run: python3 leilao_routine.py prepare

      - name: 3/4 — Enviar WhatsApp (idempotente)
        continue-on-error: true
        run: python3 whatsapp_sender.py

      - name: 4/4 — Fixar baseline (novos de hoje != novos amanhã)
        run: python3 leilao_routine.py commit

      - name: Limpar credenciais e podar CSVs antigos (mantém os 3 mais novos)
        run: |
          rm -f whatsapp_secrets.json
          ls -1t "planilhas leilao"/Lista_imoveis_PB*.csv 2>/dev/null | tail -n +4 | xargs -r rm -f

      - name: Commit do estado de volta no repo
        id: commit
        run: |
          git config user.name "leilao-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add leilao_state.json imoveis.json dashboard_leilao.html \
                  validate_queue.json last_summary.json whatsapp_outbox.json \
                  whatsapp_sent.json download_status.json shortlinks.json "planilhas leilao" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nada mudou — nada a commitar."
          else
            git commit -m "rotina diária $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Preparar painel para o GitHub Pages
        run: |
          mkdir -p _site
          cp dashboard_leilao.html _site/index.html

      - name: Upload do artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      # ÚLTIMO passo de propósito: tudo acima já rodou e foi publicado com o último
      # CSV bom. Se hoje NÃO veio CSV novo, falhamos o job aqui só para o GitHub te
      # mandar o e-mail de "workflow failed". Sem dados frescos, o app não cumpre o papel.
      - name: Avisar por e-mail se o CSV não atualizou hoje
        if: steps.download.outputs.fresh != 'true'
        run: |
          echo "::error title=CSV nao atualizou::Os metodos de download falharam (Z=Zyte API, D=curl direto). Rodei com o ultimo CSV bom. Verifique o Secret ZYTE_API_KEY, o saldo de creditos da Zyte e os logs do passo de download."
          exit 1

  publicar-painel:
    needs: rotina
    if: ${{ !cancelled() }}   # publica o painel mesmo se a rotina sinalizou CSV velho
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy no GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
